name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/unichat

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Read package metadata
        id: package
        run: |
          PACKAGE_NAME=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['name'])")
          PACKAGE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check published version
        id: published
        run: |
          set +e
          python3 - <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          package_name = os.environ["PACKAGE_NAME"]
          package_version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{package_name}/{package_version}/json"

          try:
              urllib.request.urlopen(url)
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  sys.exit(1)
              raise
          PY
          STATUS=$?
          set -e

          if [ "$STATUS" = "0" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping."
          elif [ "$STATUS" = "1" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            exit "$STATUS"
          fi
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}

      - name: Build
        if: steps.published.outputs.exists == 'false'
        run: uv build --out-dir dist

      - name: Publish
        if: steps.published.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
